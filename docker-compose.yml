services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    volumes:
      - ./frontend/public/models:/usr/share/nginx/html/models:ro
    depends_on:
      - signaling
    restart: unless-stopped

  signaling:
    build:
      context: .
      dockerfile: signaling/Dockerfile
    environment:
      PORT: "8788"
    ports:
      - "8788:8788"
    restart: unless-stopped

  worker:
    profiles: ["citygs"]
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      SIGNALING_URL: ws://signaling:8788
      CITYGS_RENDER_SERVER_URL_COARSE: http://host.docker.internal:9100/render
      CITYGS_RENDER_SERVER_URL_FULL: http://host.docker.internal:9101/render
      CITYGS_RENDER_SERVER_URL_LOD: http://host.docker.internal:9102/render
      CITYGS_FRAME_SERVER_HOST: 0.0.0.0
      CITYGS_FRAME_SERVER_PORT: "8789"
      CITYGS_PUBLIC_FRAME_BASE_URL: http://127.0.0.1:8789
      CITYGS_RENDER_LOOP_FPS: "5"
      CITYGS_STREAM_FPS: "8"
      CITYGS_JPEG_QUALITY: "85"
    ports:
      - "8789:8789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - signaling
    restart: unless-stopped

  worker-mock:
    profiles: ["mock"]
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["node", "worker/dist/mock-worker.js"]
    environment:
      SIGNALING_URL: ws://signaling:8788
    depends_on:
      - signaling
    restart: unless-stopped

